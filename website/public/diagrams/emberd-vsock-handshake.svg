<svg viewBox="0 0 1120 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect x="1" y="1" width="1118" height="558" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />

  <defs>
    <marker id="hs-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="hs-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>

  <text x="40" y="50" font-size="30" font-weight="600" fill="#0f172a">The vsock handshake</text>
  <text x="40" y="80" font-size="16" fill="#94a3b8">Firecracker exposes guest vsock as a host Unix socket; the host opens a port, then frames flow.</text>

  <!-- lifelines -->
  <line x1="170" y1="152" x2="170" y2="512" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 5" />
  <line x1="560" y1="152" x2="560" y2="512" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 5" />
  <line x1="950" y1="152" x2="950" y2="512" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 5" />

  <!-- headers -->
  <g>
    <rect x="100" y="106" width="140" height="46" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text x="170" y="135" font-size="16" font-weight="600" text-anchor="middle" fill="#0f172a">host</text>

    <rect x="478" y="106" width="164" height="46" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />
    <text x="560" y="129" font-size="13" font-weight="600" text-anchor="middle" fill="#64748b">firecracker UDS</text>
    <text x="560" y="146" font-size="11" text-anchor="middle" fill="#94a3b8">vsock.sock</text>

    <rect x="868" y="106" width="164" height="46" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text x="950" y="135" font-size="16" font-weight="600" text-anchor="middle" fill="#0f172a">guest :1024</text>
  </g>

  <text x="560" y="186" font-size="13" text-anchor="middle" fill="#94a3b8">host first connects to vsock.sock (a Unix domain socket)</text>

  <!-- step 1: CONNECT -->
  <g fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="170" y1="232" x2="944" y2="232" marker-end="url(#hs-blue)" />
  </g>
  <text x="540" y="222" font-size="14" font-weight="600" text-anchor="middle" fill="#2563eb">1 · CONNECT 1024\n</text>
  <text x="905" y="252" font-size="12" text-anchor="middle" fill="#94a3b8">accept()</text>

  <!-- step 2: OK ack -->
  <g fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="950" y1="300" x2="176" y2="300" marker-end="url(#hs-blue)" />
  </g>
  <text x="560" y="290" font-size="14" font-weight="600" text-anchor="middle" fill="#2563eb">2 · OK 0\n  (ack, read one byte at a time)</text>

  <!-- step 3: ExecRequest -->
  <g fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="170" y1="378" x2="944" y2="378" marker-end="url(#hs-blue)" />
  </g>
  <text x="540" y="368" font-size="14" font-weight="600" text-anchor="middle" fill="#2563eb">3 · ExecRequest frame</text>
  <text x="540" y="398" font-size="12" text-anchor="middle" fill="#94a3b8">4-byte length prefix + JSON</text>
  <text x="905" y="368" font-size="12" text-anchor="middle" fill="#94a3b8">ReadMessage</text>

  <!-- step 4: ExecResult -->
  <g fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="950" y1="456" x2="176" y2="456" marker-end="url(#hs-green)" />
  </g>
  <text x="560" y="446" font-size="14" font-weight="600" text-anchor="middle" fill="#10b981">4 · ExecResult frame</text>
  <text x="905" y="476" font-size="12" text-anchor="middle" fill="#94a3b8">WriteMessage</text>

  <text x="560" y="524" font-size="12" text-anchor="middle" fill="#94a3b8">One ExecRequest in, one ExecResult back, per connection.</text>
</svg>
