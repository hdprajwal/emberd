<svg viewBox="0 0 1120 500" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect x="1" y="1" width="1118" height="498" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />

  <defs>
    <marker id="ov-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
  </defs>

  <text x="48" y="54" font-size="30" font-weight="600" fill="#0f172a">How a request reaches your code</text>
  <text x="48" y="84" font-size="16" fill="#94a3b8">HTTP enters the host daemon; control crosses into the guest over vsock — never a network.</text>

  <!-- Firecracker microVM boundary -->
  <rect x="724" y="126" width="344" height="332" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 6" />
  <text x="746" y="150" font-size="13" font-weight="600" fill="#94a3b8">Firecracker microVM</text>

  <!-- Client -->
  <g>
    <rect x="52" y="176" width="150" height="74" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="2" />
    <text x="127" y="219" font-size="18" font-weight="600" text-anchor="middle" fill="#0f172a">client</text>
  </g>

  <!-- Daemon -->
  <g>
    <rect x="344" y="166" width="254" height="94" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text x="471" y="203" font-size="19" font-weight="600" text-anchor="middle" fill="#0f172a">emberd daemon</text>
    <text x="471" y="228" font-size="13" text-anchor="middle" fill="#94a3b8">host · owns sandbox lifecycle</text>
  </g>

  <!-- Guest agent -->
  <g>
    <rect x="756" y="168" width="278" height="92" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <text x="895" y="202" font-size="19" font-weight="600" text-anchor="middle" fill="#0f172a">emberd-init</text>
    <text x="895" y="227" font-size="13" text-anchor="middle" fill="#94a3b8">guest PID 1 · runs your code</text>
  </g>

  <!-- Lower boxes -->
  <g>
    <rect x="344" y="356" width="254" height="76" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" />
    <text x="471" y="388" font-size="16" font-weight="600" text-anchor="middle" fill="#0f172a">firecracker process</text>
    <text x="471" y="410" font-size="13" text-anchor="middle" fill="#94a3b8">one per sandbox</text>
  </g>
  <g>
    <rect x="758" y="356" width="274" height="76" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" />
    <text x="895" y="388" font-size="16" font-weight="600" text-anchor="middle" fill="#0f172a">overlayfs root</text>
    <text x="895" y="410" font-size="13" text-anchor="middle" fill="#94a3b8">squashfs + tmpfs</text>
  </g>

  <!-- Arrows -->
  <g stroke="#2563eb" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="204" y1="213" x2="340" y2="213" marker-end="url(#ov-arrow)" />
    <line x1="600" y1="213" x2="752" y2="213" marker-end="url(#ov-arrow)" />
    <line x1="471" y1="262" x2="471" y2="352" marker-end="url(#ov-arrow)" />
    <line x1="895" y1="262" x2="895" y2="352" marker-end="url(#ov-arrow)" />
  </g>

  <g>
    <text x="272" y="203" font-size="14" font-weight="600" text-anchor="middle" fill="#2563eb">HTTP</text>
    <text x="676" y="197" font-size="14" font-weight="600" text-anchor="middle" fill="#2563eb">vsock</text>
    <text x="676" y="215" font-size="12" text-anchor="middle" fill="#94a3b8">(virtio)</text>
  </g>

  <text x="560" y="476" font-size="13" text-anchor="middle" fill="#94a3b8">One microVM per sandbox · no network device in v0.1 · the daemon talks to the guest over vsock</text>
</svg>
