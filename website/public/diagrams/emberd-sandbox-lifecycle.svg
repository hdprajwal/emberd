<svg viewBox="0 0 1080 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect x="1" y="1" width="1078" height="418" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />

  <defs>
    <marker id="lc-ink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a" />
    </marker>
    <marker id="lc-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="lc-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
    </marker>
  </defs>

  <text x="40" y="50" font-size="30" font-weight="600" fill="#0f172a">Sandbox lifecycle</text>
  <text x="40" y="80" font-size="16" fill="#94a3b8">A sandbox is either running or gone — there is no paused state in v0.1.</text>

  <!-- self-loop label + arc on Running -->
  <text x="550" y="150" font-size="14" font-weight="600" text-anchor="middle" fill="#2563eb">POST /sandboxes/{id}/exec</text>
  <text x="550" y="170" font-size="12" text-anchor="middle" fill="#94a3b8">round-trip over vsock</text>
  <path d="M 505 205 C 480 120, 620 120, 595 205" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" marker-end="url(#lc-blue)" />

  <!-- states -->
  <g>
    <rect x="80" y="220" width="150" height="70" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5" />
    <text x="155" y="262" font-size="17" font-weight="600" text-anchor="middle" fill="#64748b">(none)</text>

    <rect x="460" y="208" width="180" height="94" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5" />
    <text x="550" y="262" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">Running</text>

    <rect x="840" y="220" width="180" height="70" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 5" />
    <text x="930" y="256" font-size="16" font-weight="600" text-anchor="middle" fill="#ef4444">gone</text>
    <text x="930" y="277" font-size="11" text-anchor="middle" fill="#94a3b8">VMM killed · dir removed</text>
  </g>

  <!-- transitions -->
  <g fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="230" y1="255" x2="455" y2="255" stroke="#0f172a" marker-end="url(#lc-ink)" />
    <line x1="640" y1="255" x2="835" y2="255" stroke="#ef4444" marker-end="url(#lc-red)" />
  </g>
  <g>
    <text x="342" y="243" font-size="14" font-weight="600" text-anchor="middle" fill="#0f172a">POST /sandboxes</text>
    <text x="342" y="278" font-size="12" text-anchor="middle" fill="#94a3b8">boot a microVM</text>
    <text x="737" y="243" font-size="14" font-weight="600" text-anchor="middle" fill="#ef4444">DELETE /sandboxes/{id}</text>
    <text x="737" y="278" font-size="12" text-anchor="middle" fill="#94a3b8">SIGTERM + cleanup</text>
  </g>
</svg>
